version: "3.8"

services:
  postgres:
    image: postgres:15
    env_file:
      - ./config/.env.backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: tokamaknetwork/trh-backend:${TRH_BACKEND_VERSION:-v1.0.1-alpha}
    ports:
      - "8000:8000"
    env_file:
      - ./config/.env.backend
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - backend_storage:/app/storage

  ui:
    image: tokamaknetwork/trh-platform-ui:${TRH_PLATFORM_UI_VERSION:-1.0.0}
    ports:
      - "3000:3000"
    env_file:
      - ./config/.env.frontend
    depends_on:
      - backend
    restart: unless-stopped

  chatbot:
    image: tokamaknetwork/tokamak-architect-bot:${TRH_CHATBOT_VERSION:-latest}
    container_name: tokamak-architect-bot
    ports:
      - "8001:8001"
    env_file:
      - ./config/.env.chatbot
    volumes:
      - chatbot_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_storage:
  chatbot_data:
