version: "3.8"

services:
  postgres:
    image: postgres:15
    env_file:
      - ./config/.env.backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: tokamaknetwork/trh-backend@sha256:fe7cb41cb852cfc955d4ac21bbd5917c7e505affba475a166abd2e43fb2375be
    ports:
      - "8000:8000"
    env_file:
      - ./config/.env.backend
    depends_on:
      - postgres
    restart: unless-stopped
    volumes:
      - backend_storage:/app/storage

  ui:
    image: tokamaknetwork/trh-platform-ui@sha256:9d0cf611b30ec77ed77f0a2fcea763e328eb2482558d70ccd875edca713cbdbb
    ports:
      - "3000:3000"
    env_file:
      - ./config/.env.frontend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_storage:
